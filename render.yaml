services:
  - type: web
    name: FRC-281-scouting
    env: python

    
    # Build command: sync dependencies and initialize database
    buildCommand: |
      uv sync --frozen &&
      uv cache prune --ci &&
      uv run python -m frc_data_281.db &&
      uv run python -m frc_data_281.the_blue_alliance.pipeline
    
    # Start command: verify DB initialized, then run Streamlit app
    startCommand: bash -c "python -m frc_data_281.db 2>/dev/null; streamlit run frc_data_281/app/Home.py --server.port=$PORT --server.address=0.0.0.0 --logger.level=info"
    
    # Environment variables
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: STREAMLIT_CLIENT_TOOLBAR_MODE
        value: viewer
      - key: DB_PATH
        value: /var/data/frc2026.duckdb
    
    # Health check
    healthCheckPath: /
    
    # Auto-deploy on push to main
    autoDeploy: false
